{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Civic{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="{% static 'citizen/css/auth.css' %}">

    {% block css %}{% endblock %}
</head>

<body class="bg-black text-white">

{% if request.user.is_authenticated %}

<div class="flex min-h-screen">

    {% include "citizen/sidebar.html" %}

    <div class="flex-1">
        {% block content %}{% endblock %}
    </div>

</div>

{% else %}

<div class="min-h-screen">
    {% block auth_content %}
    {% endblock %}
</div>

{% endif %}

<script src="{% static 'citizen/js/login.js' %}"></script>

{% block js %}{% endblock %}

</body>
</html>
