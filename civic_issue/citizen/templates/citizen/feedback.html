{% extends "citizen/base.html" %}

{% block title %}
Feedback
{% endblock %}

{% block content %}

<div class="w-full min-h-screen bg-black text-white p-8 lg:p-10 flex justify-center">

    <div class="
        w-full
        max-w-3xl
        bg-gray-900
        border
        border-gray-800
        rounded-2xl
        shadow-xl
        p-10">

        <h1 class="text-4xl font-bold text-yellow-400 text-center mb-8">
            ⭐ Give Feedback
        </h1>

        <!-- Complaint Info -->
        <div class="bg-gray-800 rounded-xl p-6 mb-8">

            <h2 class="text-2xl font-bold text-yellow-400">
                {{ complaint.title }}
            </h2>

            <p class="text-gray-400 mt-3">
                {{ complaint.description }}
            </p>

            <div class="mt-5 grid md:grid-cols-2 gap-5">

                <div>
                    <p class="text-gray-500 text-sm">Department</p>
                    <p class="text-white font-semibold">
                        {{ complaint.department }}
                    </p>
                </div>

                <div>
                    <p class="text-gray-500 text-sm">Location</p>
                    <p class="text-white font-semibold">
                        {{ complaint.location }}
                    </p>
                </div>

            </div>

        </div>

        <form method="POST">

            {% csrf_token %}

            <label class="block text-white font-semibold mb-2">
                Rating
            </label>

            <select
                name="rating"
                class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-white">

                <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
                <option value="4">⭐⭐⭐⭐ Good</option>
                <option value="3">⭐⭐⭐ Average</option>
                <option value="2">⭐⭐ Poor</option>
                <option value="1">⭐ Bad</option>

            </select>

            <label class="block text-white font-semibold mt-8 mb-2">
                Your Feedback
            </label>

            <textarea
                name="message"
                rows="6"
                class="w-full bg-gray-800 border border-gray-700 rounded-lg p-4 text-white"
                placeholder="Write your feedback here..."
                required></textarea>

            <button
                type="submit"
                class="w-full mt-8 bg-yellow-400 text-black py-3 rounded-lg font-bold hover:bg-yellow-300 transition">

                Submit Feedback

            </button>

        </form>

    </div>

</div>

{% endblock %}
