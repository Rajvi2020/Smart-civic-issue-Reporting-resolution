{% extends "citizen/base.html" %}

{% block title %}
Home
{% endblock %}

{% block content %}

<div class="min-h-screen bg-black flex items-center justify-center">

    <div class="text-center">

        <h1 class="text-6xl font-bold text-yellow-400">
            Smart Civic Issue Reporting
        </h1>

        <p class="text-gray-300 text-xl mt-6">
            Report civic problems easily and track their resolution.
        </p>

        <div class="mt-10 space-x-4">

            <a href="{% url 'login' %}"
               class="bg-yellow-400 text-black px-8 py-3 rounded-lg font-bold hover:bg-yellow-300">

                Citizen Login

            </a>

            <a href="{% url 'register' %}"
               class="border border-yellow-400 text-yellow-400 px-8 py-3 rounded-lg font-bold hover:bg-yellow-400 hover:text-black">

                Sign Up

            </a>

        </div>

    </div>
