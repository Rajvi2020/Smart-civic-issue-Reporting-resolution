<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body
    class="bg-gradient-to-br from-black via-zinc-900 to-black flex justify-center items-center min-h-screen overflow-hidden">

    <!-- Background Blur -->
    <div
        class="absolute w-96 h-96 bg-yellow-400 opacity-10 rounded-full blur-3xl -top-20 -left-20">
    </div>

    <div
        class="absolute w-96 h-96 bg-yellow-500 opacity-10 rounded-full blur-3xl bottom-0 right-0">
    </div>

    <!-- Login Card -->

    <div
        class="relative bg-white/5 backdrop-blur-xl border border-yellow-400/20 shadow-2xl rounded-3xl p-10 w-[420px]">

        <!-- Logo -->

        <div class="flex justify-center">

            <div
                class="w-20 h-20 rounded-full bg-yellow-400 flex justify-center items-center shadow-lg">

                <i class="fa-solid fa-road text-4xl text-black"></i>

            </div>

        </div>

        <!-- Heading -->

        <h1 class="text-white text-4xl font-bold text-center mt-6">

            Admin <span class="text-yellow-400">Login</span>

        </h1>

        <p class="text-gray-400 text-center mt-2">

            Smart Civic Issue Reporting System

        </p>

        {% if error %}

        <div
            class="bg-red-500/20 border border-red-500 text-red-300 p-3 rounded-lg mt-6 text-center">

            {{ error }}

        </div>

        {% endif %}

        <!-- Login Form -->

        <form method="POST" class="mt-8 space-y-6">

            {% csrf_token %}

            <!-- Email -->

            <div>

                <label class="text-gray-300 mb-2 block">

                    Email Address

                </label>

                <div class="relative">

                    <i
                        class="fa-solid fa-envelope absolute left-4 top-4 text-yellow-400"></i>

                    <input type="email"
                        name="email"
                        placeholder="Enter Email"
                        required
                        class="w-full bg-black/50 border border-gray-700 rounded-xl py-3 pl-12 pr-4 text-white focus:border-yellow-400 focus:ring-2 focus:ring-yellow-400 outline-none transition">

                </div>

            </div>

            <!-- Password -->

            <div>

                <label class="text-gray-300 mb-2 block">

                    Password

                </label>

                <div class="relative">

                    <i
                        class="fa-solid fa-lock absolute left-4 top-4 text-yellow-400"></i>

                    <input type="password"
                        name="password"
                        placeholder="Enter Password"
                        required
                        class="w-full bg-black/50 border border-gray-700 rounded-xl py-3 pl-12 pr-4 text-white focus:border-yellow-400 focus:ring-2 focus:ring-yellow-400 outline-none transition">

                </div>

            </div>

            <!-- Login Button -->

            <button
                class="w-full bg-yellow-400 hover:bg-yellow-300 text-black font-bold py-3 rounded-xl transition duration-300 shadow-lg hover:scale-105" href="/admin_dashboard">

                <i class="fa-solid fa-right-to-bracket mr-2"></i>

                Login

            </button>

        </form>

        <!-- Footer -->

        <div class="mt-8 border-t border-gray-700 pt-5">

            <p class="text-center text-gray-500 text-sm">

                © 2026 Smart Civic Issue Reporting System

            </p>

        </div>

    </div>

</body>

</html>
